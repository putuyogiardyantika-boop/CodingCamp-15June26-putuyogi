<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Life Dashboard — personal productivity hub with greeting, focus timer, to-do list, and quick links." />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Theme toggle — fixed position, outside main layout -->
  <button
    id="theme-toggle"
    class="theme-toggle"
    type="button"
    aria-label="Toggle light/dark mode"
  >🌙</button>

  <main class="dashboard" aria-label="Life Dashboard">

    <!-- ===== Widget 1: Greeting ===== -->
    <section
      class="widget widget--greeting"
      id="widget-greeting"
      aria-labelledby="greeting-text"
    >
      <!-- Live region so screen readers announce time updates -->
      <div aria-live="polite" aria-atomic="true" class="greeting__live">
        <time class="greeting__time" id="greeting-time" aria-label="Current time">HH:MM</time>
        <time class="greeting__date" id="greeting-date" aria-label="Current date">Day, DD Month YYYY</time>
        <p class="greeting__text"  id="greeting-text">Good Morning</p>
      </div>

      <div class="greeting__name-form" id="greeting-name-form">
        <label for="greeting-name-input" class="sr-only">Your name</label>
        <input
          type="text"
          id="greeting-name-input"
          class="greeting__name-input"
          placeholder="Enter your name..."
          maxlength="30"
          autocomplete="given-name"
          aria-label="Enter your name for personalised greeting"
        />
        <button type="button" id="greeting-name-save" class="greeting__name-btn">Save</button>
      </div>
    </section>

    <!-- ===== Widget 2: Focus Timer ===== -->
    <section
      class="widget widget--timer"
      id="widget-timer"
      aria-labelledby="focus-timer-title"
    >
      <h2 class="widget__title" id="focus-timer-title">Focus Timer</h2>

      <!-- <output> is the correct semantic element for a live calculated result -->
      <output
        class="timer__display"
        id="timer-display"
        aria-live="off"
        aria-label="Timer countdown"
        role="timer"
      >25:00</output>

      <div class="timer__controls" role="group" aria-label="Timer controls">
        <button type="button" id="timer-start" aria-label="Start timer">Start</button>
        <button type="button" id="timer-stop"  aria-label="Stop timer"  disabled>Stop</button>
        <button type="button" id="timer-reset" aria-label="Reset timer">Reset</button>
      </div>

      <p
        class="timer__notification hidden"
        id="timer-notification"
        role="alert"
        aria-live="assertive"
      >
        ✅ Session complete! Time to take a break.
      </p>
    </section>

    <!-- ===== Widget 3: To-Do List ===== -->
    <section
      class="widget widget--todo"
      id="widget-todo"
      aria-labelledby="todo-title"
    >
      <h2 class="widget__title" id="todo-title">To-Do List</h2>

      <form class="todo__form" id="todo-form" aria-label="Add new task">
        <label for="todo-input" class="sr-only">New task</label>
        <input
          type="text"
          id="todo-input"
          placeholder="Add a new task..."
          autocomplete="off"
          aria-label="Type a new task"
        />
        <button type="submit">Add</button>
      </form>

      <ul
        class="todo__list"
        id="todo-list"
        aria-label="Task list"
        aria-live="polite"
      ></ul>
    </section>

    <!-- ===== Widget 4: Quick Links ===== -->
    <section
      class="widget widget--links"
      id="widget-links"
      aria-labelledby="links-title"
    >
      <h2 class="widget__title" id="links-title">Quick Links</h2>

      <form class="links__form" id="links-form" aria-label="Add new quick link">
        <fieldset class="links__fieldset">
          <legend class="links__legend">Add Quick Link</legend>

          <label for="links-label" class="sr-only">Link label</label>
          <input
            type="text"
            id="links-label"
            name="links-label"
            placeholder="Label (e.g. GitHub)"
            autocomplete="off"
            aria-label="Link label"
          />

          <label for="links-url" class="sr-only">Link URL</label>
          <input
            type="url"
            id="links-url"
            name="links-url"
            placeholder="URL (e.g. https://...)"
            autocomplete="url"
            aria-label="Link URL"
          />

          <button type="submit" class="links__add-btn">Add</button>
        </fieldset>
      </form>

      <ul
        class="links__grid"
        id="links-grid"
        aria-label="Quick links"
        aria-live="polite"
      ></ul>
    </section>

  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
